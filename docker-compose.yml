services:
  db:
    build:
      context: .
      dockerfile: Dockerfile.db
    image: maya-rpg-db:latest
    container_name: maya-rpg-db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-maya_rpg}
      POSTGRES_USER: ${DB_USER:-maya_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required — set it in .env}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-maya_user} -d ${DB_NAME:-maya_rpg}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - maya-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: maya-rpg-api
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-maya_user}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required — set it in .env}
      DB_NAME: ${DB_NAME:-maya_rpg}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:4200,http://localhost:3000}
      PORT: 3000
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - "3000:3000"
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/docs || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - maya-network

networks:
  maya-network:
    driver: bridge

volumes:
  pg_data:
    driver: local
